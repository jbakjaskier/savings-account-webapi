# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Unit Test
      run: dotnet test ./Westpac.Evaluation.Testing.Unit.SavingsAccountCreator/Westpac.Evaluation.Testing.Unit.SavingsAccountCreator.csproj --no-build --verbosity normal
    - name: Integration Test
      run: dotnet test ./Westpac.Evaluation.Testings.Integration.SavingsAccountCreator/Westpac.Evaluation.Testings.Integration.SavingsAccountCreator.csproj
